<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Just Apply</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f9;
      --surface: #ffffff;
      --border: #e0e0e0;
      --text-primary: #1a1a1a;
      --text-secondary: #555555;
      --text-muted: #999999;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --tag-bg: #f0f0f0;
      --na-color: #bbb;
      --header-bg: #ffffff;
      --row-hover: #f5f5f5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 28px 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 20px;
    }

    header .container {
      max-width: 100%;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .header-title {
      flex: 1;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .search-wrap {
      flex-shrink: 0;
    }

    #search {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 13px;
      width: 220px;
      background: var(--bg);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }

    #search:focus {
      border-color: var(--accent);
    }

    #search::placeholder {
      color: var(--text-muted);
    }

    main {
      padding: 24px 0 60px;
    }

    .count-bar {
      margin-bottom: 14px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .company-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .company-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: box-shadow 0.15s;
    }

    .company-item:hover {
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
    }

    .company-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      gap: 12px;
    }

    .company-header:hover {
      background: var(--row-hover);
    }

    .company-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }

    .company-location-inline {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }

    .chevron {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: var(--text-muted);
      transition: transform 0.2s ease;
    }

    .company-item.open .chevron {
      transform: rotate(180deg);
    }

    .company-body {
      display: none;
      border-top: 1px solid var(--border);
      padding: 18px 18px 20px;
    }

    .company-item.open .company-body {
      display: block;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 10px 16px;
    }

    .info-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      padding-top: 1px;
    }

    .info-value {
      font-size: 13px;
      color: var(--text-secondary);
      word-break: break-word;
    }

    .info-value.na {
      color: var(--na-color);
      font-style: italic;
    }

    .info-value a {
      color: var(--accent);
      text-decoration: none;
    }

    .info-value a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .info-divider {
      grid-column: 1 / -1;
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0;
    }

    .no-results {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 20px;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      header .container { flex-direction: column; align-items: stretch; gap: 12px; }
      #search { width: 100%; }
      .company-location-inline { display: none; }
      .info-grid { grid-template-columns: 1fr; gap: 8px 0; }
      .info-label { border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }
      .info-label:first-child { border: none; padding-top: 0; margin-top: 0; }
      .info-divider { display: none; }
    }
  </style>
</head>

function val(v) {
  if (!v || v === '(N/A)' || v.trim() === '') return null;
  return v.trim();
}

function linkVal(v, href) {
  if (!v) return `<span class="na">N/A</span>`;
  const url = href || (v.includes('@') ? `mailto:${v}` : `https://${v}`);
  return `<a href="${url}" target="_blank" rel="noopener">${v}</a>`;
}

function textVal(v) {
  if (!v) return `<span class="na">N/A</span>`;
  return v;
}

function buildItem(c) {
  const el = document.createElement('div');
  el.className = 'company-item';
  el.dataset.name = c.name.toLowerCase();
  el.innerHTML = `
    <div class="company-header" role="button" tabindex="0" aria-expanded="false">
      <span class="company-name">${c.name}</span>
      <span class="company-location-inline">${c.location || ''}</span>
      <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 6 8 10 12 6"/>
      </svg>
    </div>
    <div class="company-body">
      <div class="info-grid">
        <span class="info-label">Location</span>
        <span class="info-value">${textVal(c.location)}</span>

        <hr class="info-divider" />

        <span class="info-label">Website</span>
        <span class="info-value">${linkVal(c.website)}</span>

        <hr class="info-divider" />

        <span class="info-label">Careers</span>
        <span class="info-value">${linkVal(c.career)}</span>

        <hr class="info-divider" />

        <span class="info-label">Email</span>
        <span class="info-value">${c.email ? c.email.split(';').map(e => linkVal(e.trim())).join('<br/>') : '<span class="na">N/A</span>'}</span>

        <hr class="info-divider" />

        <span class="info-label">LinkedIn</span>
        <span class="info-value">${linkVal(c.linkedin)}</span>

        <hr class="info-divider" />

        <span class="info-label">Contact</span>
        <span class="info-value">${textVal(c.contact)}</span>
      </div>
    </div>
  `;

  const header = el.querySelector('.company-header');
  function toggle() {
    const isOpen = el.classList.toggle('open');
    header.setAttribute('aria-expanded', isOpen);
  }

  header.addEventListener('click', toggle);
  header.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
  });

  return el;
}

let items = companies.map(buildItem);
items.forEach(el => list.appendChild(el));

function updateCount(n, total) {
  countEl.textContent = n === total ? `${total} companies` : `${n} of ${total} companies`;
}

updateCount(companies.length, companies.length);

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  let visible = 0;
  items.forEach(el => {
    const match = !q || el.dataset.name.includes(q);
    el.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  noResults.style.display = visible === 0 ? '' : 'none';
  updateCount(visible, companies.length);
});
</script>
</body>
</html>
